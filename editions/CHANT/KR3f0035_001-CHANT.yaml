body:
  text: 海島算經海島算經今有望海島立兩表齊高三丈前後相去千步令後表與前表參相直從前表卻行一百二十三步人目著地取望島峰與表末參合從後表卻行一百二十七步人目著地取望島峰亦與表末參合問島高及去表各幾何答曰島高四里五十五步去表一百二里一百五十步術曰以表高乘表間為實相多為法除之所得加表高即得島高求前表去島遠近者以前表卻行乘表間為實相多為法除之得島去表數今有望松生山上不知高下立兩表齊高二丈前後相去五十步令後表與前表參相直從前表卻行七步四尺薄地遙望松末與表端參合又望松本入表二尺八寸復從後表卻行八步五尺薄地遙望松末亦與表端參合問松高及山去表各幾何答曰松高一十二丈二尺八寸山去表一里二十八步七分步之四術曰以入表乘表間為實相多為法除之加入表即得松高求表去山遠近者置表間以前表卻行乘之為實相多為法除之得山去表今有南望方邑不知大小立兩表東西去六丈齊人目以索連之令東表與邑東南隅及東北隅參相直當東表之北卻行五步遙望邑西北隅入索東端二丈二尺六寸半又卻北行去表一十三步二尺遙望邑西北隅適與西表相參合問邑方及邑去表各幾何答曰邑方三里四十三步四分步之三邑去表四里四十五步術曰以入索乘後去表以雨表相去除之所得為景差以前去表減之不盡以為法置後去表以前去表減之餘以乘入索為實實如法而一得邑方求去表遠近者置後去表以景差減之餘以乘前去表為實實如法而一得邑去表今有望深谷偃矩岸上令句高六尺從句端望谷底入下股九尺一寸又設重矩于上其矩問相去三丈更從句端望谷底入上股八尺五寸問谷深幾何答曰四十一丈九尺術曰置矩間以上股乘之為實上下股相減餘為法除之所得以句高減之即得谷深今有登山望樓樓在平地偃矩山上令句高六尺從句端斜望樓足入下股一丈二尺又設重矩于上令其間相去三丈更從句端斜望樓足入上股一丈一尺四寸又立小表于入股之會復從句端斜望樓岑端入小表八寸問樓高幾何答曰八丈術曰上下股相減餘為法置矩間以下股乘之如句高而一所以入小表乘之為實實如法而一即是樓高今有東南望波口立兩表南北相去九丈以索薄地連之當北表之西卻行去表六丈薄地遙望波口南岸入索北端四丈二寸以望北岸入前所望表裏一丈二尺又卻後行去表一十三丈五尺薄地遙望波口南岸與南表參合問波口廣幾何答曰一里二百步術曰以後去表乘入索如表相去而一所得以前去表減之餘以為法復以前去表減後去表餘以乘入所望表裏為實實如法而一得波口廣今有望清淵淵下有白石偃矩岸上令句高三尺斜望水岸入下股四尺五寸望白石入下股二尺四寸又設重矩于上其問相去四尺更從句端斜望水岸入上股四尺以望白石入上股二尺二寸問水深幾何答曰一丈二尺術曰置望水上下股相減餘以乘望石上股為上率又以望石上下股相減餘以乘望水上股為下率兩率相減餘以乘矩間為實以二差相乘為法實如法而一得水深又術列望水上下股及望石上下股相減餘并為法以望石下股減望水下股餘以乘矩間為實實如法而一得水深今有登山望津津在山南偃矩山上令句高一丈二尺從句端斜望津南岸入下股二丈三尺一寸又望津北岸入前望股裏一丈八寸更登高巖北卻行二十二步上登五十一步偃矩山上更從句端斜望津南岸入上股二丈二尺問津廣幾何答曰二里一百二步術曰以句高乘下股如上股而一所得以句高減之餘為法置北行以句高乘之如上股而一所得以減上登餘以乘入股裏為實實如法而一即得津廣今有登山臨邑邑在山南偃矩山上令句高三尺五寸令句端與邑東南隅及東北隅參相直從句端遙望東北隅入下股一丈二尺又施橫句于入股之會從立句端望西北隅入橫句五尺望東南隅入下股一丈八尺又設重矩于上令矩間相去四丈更從立句端望東南隅入上股一丈七尺五寸問邑廣長各幾何答曰南北長一里一百步東西廣一里三十三步少半步術曰以句高乘東南隅入下股如上股而一所得減句高餘為法以東北隅下股減東南隅下股餘以乘矩間為實實如法而一得邑南北長也求邑廣以入橫句乘矩間為實實如法而一即得邑東西廣
