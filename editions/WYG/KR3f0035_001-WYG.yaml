  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3f0035_WYG_001-1a, image: missing/missing}
body:
  text: 海島算經晉劉徽撰唐李淳風注今有望海島立兩表齊高三丈前後相去千步令後表與前表參相直從前表卻行一百二十三步人目著地取望島峯與表末參合從後表卻行一百二十七步人目著地取望島峯亦與表末參合問島高及去表各幾何答曰島高四里五十五步去表一百二里一百五十步術曰以表高乗表間為實相多為法除之所得加表高即得島高淳風等按此術意宜云島謂山之頂上兩表謂立表木之端直案此句訛舛據術意言立兩表齊高三丈相去千步者謂立木為表兩表各高三丈其地相去千步必準之使平則表端齊平然後可測望也又言令後表與前表參相直者自海島至前表自前表退至後表三者令其參相當也非木之端直以人目于木末望島參平人去表一百二十三步為前表之始後立表末至人目于木末相望去表一百二十七步二表相去為相多以為法案此亦訛舛據術意人去前表一百二十三步以目著地望表末斜與島峯參合又去後表一百二十七步以目著地望表末亦與島峯參合非于木末望島也前後去表相減餘四步為相多非二表相去也當由傳寫失真後人妄加改竄遂不可通前後表相去千步為表間以表高乗之為實以法除之加表高即是島高積步得一千二百五十五步以里法三百步除之得四里餘五十五步是島高之步數也求前表去島逺近者以前表卻行乗表間為實相多為法除之得島去表數淳風等按此術意宜云前去表乗表間得一十二萬三千步以相多四步為法除之得三萬七百五十步又以里法三百步除之得一百二里一百五十步是島去表里數今有望松生山上不知高下立兩表齊高二丈前後相去五十步令後表與前表參相直從前表卻行七步四尺薄地遙望松末與表端參合又望松本入表二尺八寸復從後表卻行八步五尺薄地遙望松末亦與表端參合問松高及山去表各幾何答曰松高一十二丈二尺八寸山去表一里二十八步七分步之四術曰以入表乗表間為實相多為法除之加入表即得松高淳風等按此術意宜云前後去表相減餘七尺是相多以為法表間步通之為尺以入表乗之退位一等以為實以法除之更加入表案原本訛作加表高據術意乃加入表二尺八寸不得加表高二丈也今改正得一百二十二尺八寸以為松高退位一等得一十二丈二尺八寸也求表去山逺近者置表間以前表卻行乗之為實相多為法除之得山去表淳風等按此術意宜云表間以步尺法通之得三百尺以前去表四十六尺案四原本訛作二今改正乗之為實以相多七尺為法實如法而一得一千九百七十一尺七分尺之三以里尺法除之得一里不盡以步尺除之得二十八步不盡三還以七因之得數内子三得二十四復置步尺法以分母七乗六得四十二為步法俱半之副置平約等數即是于山去前表一里二十八步七分步之四也案去前表原本訛作去後表據術以前表卻行乗表間以相多除之得山去前表若後表卻行乗表間以相多除之則得山去後表今改正今有南望方邑不知大小立兩表東西去六丈齊人目以索連之令東表與邑東南隅及東北隅參相直當東表之北卻行五步遙望邑西北隅入索東端二丈二尺六寸半又卻北行去表一十三步二尺遙望邑西北隅適與西表相參合問邑方及邑去表各幾何答曰邑方三里四十三步四分步之三邑去表四里四十五步術曰以入索乗後去表以兩表相去除之所得為景差以前去表減之不盡以為法置後去表以前去表減之餘以乗入索為實實如法而一得邑方淳風等按此術置入索乗後去表得一千八百一十二尺以兩表相去除之得三丈二寸為景差以前去表減之餘二寸以為法前後相去表減之餘以乗入索得一萬一千三百二十五寸為實以法除之得五千六百六十二尺不盡二分尺之一以里法除之得三里不盡尺以步法除之得四十三步不盡四以分母乗之内子一得九以分母乗六得十二以三約母得四約子得三即得邑方三里四十三步四分步之三也求去表逺近者置後去表以景差減之餘以乗前去表為實實如法而一得邑去表淳風等按此術置後去表以景差尺數減之餘尺以乗前去表得一千四百九十四尺為實以法除之得七千四百七十尺以步里法除之得四里不盡二百七十尺以步法除之得四十五步即是邑去前表四里四十五步也今有望深谷偃矩岸上令句高六尺從句端望谷底入下股九尺一寸又設重矩于上其矩間相去三丈更從句端望谷底入上股八尺五寸問谷深幾何答曰四十一丈九尺術曰置矩間以上股乗之為實上下股相減餘為法除之所得以句高減之即得谷深淳風等按此術置矩間上股乗之為實又置上下股尺寸相減餘六寸以為法除實得數退位一等以句高減之餘四十一丈九尺即是谷深又一法置矩間以下股乗之為實置上下股尺數相減餘六寸以為法除之得四百五十五尺以句高并矩間得三十六尺減之餘退位一等即是谷深也今有登山望樓樓在平地偃矩山上令句高六尺從句端斜望樓足入下股一丈二尺又設重矩于上令其間相去三丈更從句端斜望樓足入上股一丈一尺四寸又立小表于入股之㑹復從句端斜望樓岑端入小表八寸問樓高幾何答曰八丈術曰上下股相減餘為法置矩間以下股乗之如句高而一所得以入小表乗之為實實如法而一即是樓高淳風等按此術置下股以上股相減餘六寸以為法又置矩間以下股乗之得三萬六千寸以句高六尺除之得六百寸以入小表乗之得四千八百寸以法除之得八百寸退位一等即是樓高八丈也今有東南望波口立兩表南北相去九丈以索薄地連之當北表之西卻行去表六丈薄地遙望波口南岸入索北端四丈二寸以望北岸入前所望表裏一丈二尺又卻後行去表一十三丈五尺案卻後行原本訛作卻行後今改正薄地遙望波口南岸與南表參合問波口廣幾何答曰一里二百步術曰以後去表乗入索如表相去而一所得以前去表減之餘以為法復以前去表減後去表餘以乗入所望表裏為實實如法而一得波口廣淳風等按此術置後去表以乗入索四百二寸得五十四萬二千七百寸以兩表相去除之得六百三寸又以前去表六百寸減之案原本脫去字今據正文補入餘有三寸為法又置前後卻行去表寸數相減餘以乗入望表裏一百二十寸得九萬寸以法除之得三萬寸為實以步里除之得一里餘以步法除之得二百步即是波口廣一里二百步也今有望清淵淵下有白石偃矩岸上令句高三尺斜望水岸入下股四尺五寸望白石入下股二尺四寸又設重矩于上其間相去四尺更從句端斜望水岸入上股四尺以望白石入上股二尺二寸問水深幾何答曰一丈二尺術曰置望水上下股相減餘以乗望石上股為上率又以望石上下股相減餘以乗望水上股為下率兩率相減餘以乗矩間為實以二差相乗為法實如法而一得水深又術列望水上下股及望石上下股相減餘并為法以望石下股減望水下股餘以乗矩間為實實如法而一得水深淳風等按此術以望水上下股相減餘五寸以乗望石上股二十二寸得一百一十寸即是上率又置望石上股減望石下股餘有二寸以乗望水上股四十寸得八十寸即是下率二率相減餘有三十寸以乗矩間四十寸得一千二百寸為實又以二差二五相乗得十為法除實退位二等即是水深一丈二尺也又術置望水上股以望水下股減之餘有五寸置望石下股以望石上股減之餘有二寸并之得七寸以為法又以望石下股以望水下股減之餘有二十一寸以乗矩間四十寸得八百四十寸以為實以七寸為法除之得一百二十寸退之得一丈二尺即是水深也今有登山望津津在山南偃矩山上令句高一丈二尺從句端斜望津南岸入下股二丈三尺一寸又望津北岸入前望股裏一丈八寸更登高巖北卻行二十二步上登五十一步偃矩山上更從句端斜望津南岸入上股二丈二尺問津廣幾何答曰二里一百二步術曰以句高乗下股如上股而一所得以句高減之餘為法置北行以句高乗之如上股而一所得以減上登餘以乗入股裏為實實如法而一即得津廣淳風等按此術置句高乗下股得二百七十七尺二寸以上股除之得一丈二尺六寸以句高一丈二尺案此下原本衍六寸以句高一丈二尺九字減之餘有六寸以為法又置北行步展為一百三十二尺以句高乗之得一千五百八十四尺以上股除之得七十二尺又置上登五十一步以每步六尺通之得三百六尺以前數減之餘二百三十四尺以乗入股裏尺數得二千五百二十七尺二寸為實實如法而一得四千二百一十二尺以步里法除之得二里餘一百二步即是津廣也今有登山臨邑邑在山南偃矩山上令句高三尺五寸令句端與邑東南隅及東北隅參相直從句端遙望東北隅入下股一丈二尺又施横句于入股之㑹從立句端望西北隅入横句五尺望東南隅入下股一丈八尺又設重矩于上令矩間相去四丈更從立句端望東南隅入上股一丈七尺五寸問邑廣長各幾何答曰南北長一里一百步東西廣一里三十三步少半步術曰以句高乗東南隅入下股如上股而一所得減句高餘為法以東北隅下股減東南隅下股餘以乗矩間為實實如法而一得邑南北長也求邑廣以入横句乗矩間為實實如法而一即得邑東西廣淳風等按此術以句高乗東南隅下股得六千三百寸又以東南隅上股一百七十五寸除之得三十六寸以句高減之餘有一寸以為法又置東北隅下股以減東南隅下股餘有六十寸以乗矩間得二萬四千寸為實實如法而一即不盈不縮以寸里法除之得一里不盡以寸步法除之得一百步即是邑南北長一里一百步也求東西廣步者置入横句之數以乗矩間得二萬寸為實實如法而一即得不盈不縮以里法除之得一里餘以步法除之得三十三步不盡二十與法俱退半之即是三分步之一也海島算經
