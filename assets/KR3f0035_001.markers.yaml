  - {type: variant, offset: 139, length: 0, content: '', WYG: 淳風等按此術意宜云島謂山之頂上兩表謂立表木之端直案此句訛舛據術意言立兩表齊高三丈相去千步者謂立木為表兩表各高三丈其地相去千步必準之使平則表端齊平然後可測望也又言令後表與前表參相直者自海島至前表自前表退至後表三者令其參相當也非木之端直以人目于木末望島參平人去表一百二十三步為前表之始後立表末至人目于木末相望去表一百二十七步二表相去為相多以為法案此亦訛舛據術意人去前表一百二十三步以目著地望表末斜與島峯參合又去後表一百二十七步以目著地望表末亦與島峯參合非于木末望島也前後去表相減餘四步為相多非二表相去也當由傳寫失真後人妄加改竄遂不可通前後表相去千步為表間以表高乗之為實以法除之加表高即是島高積步得一千二百五十五步以里法三百步除之得四里餘五十五步是島高之步數也}
