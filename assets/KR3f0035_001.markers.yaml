  - {type: variant, offset: 342, length: 0, content: '', WYG: 淳風等按此術意宜云表間以步尺法通之得三百尺以前去表四十六尺案四原本訛作二今改正乗之為實以相多七尺為法實如法而一得一千九百七十一尺七分尺之三以里尺法除之得一里不盡以步尺除之得二十八步不盡三還以七因之得數内子三得二十四復置步尺法以分母七乗六得四十二為步法俱半之副置平約等數即是于山去前表一里二十八步七分步之四也案去前表原本訛作去後表據術以前表卻行乗表間以相多除之得山去前表若後表卻行乗表間以相多除之則得山去後表今改正}
