  - {type: variant, offset: 1528, length: 0, content: '', WYG: 淳風等按此術以句高乗東南隅下股得六千三百寸又以東南隅上股一百七十五寸除之得三十六寸以句高減之餘有一寸以為法又置東北隅下股以減東南隅下股餘有六十寸以乗矩間得二萬四千寸為實實如法而一即不盈不縮以寸里法除之得一里不盡以寸步法除之得一百步即是邑南北長一里一百步也求東西廣步者置入横句之數以乗矩間得二萬寸為實實如法而一即得不盈不縮以里法除之得一里餘以步法除之得三十三步不盡二十與法俱退半之即是三分步之一也海島算經}
