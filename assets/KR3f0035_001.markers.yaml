  - {type: variant, offset: 1145, length: 0, content: '', WYG: 淳風等按此術以望水上下股相減餘五寸以乗望石上股二十二寸得一百一十寸即是上率又置望石上股減望石下股餘有二寸以乗望水上股四十寸得八十寸即是下率二率相減餘有三十寸以乗矩間四十寸得一千二百寸為實又以二差二五相乗得十為法除實退位二等即是水深一丈二尺也又術置望水上股以望水下股減之餘有五寸置望石下股以望石上股減之餘有二寸并之得七寸以為法又以望石下股以望水下股減之餘有二十一寸以乗矩間四十寸得八百四十寸以為實以七寸為法除之得一百二十寸退之得一丈二尺即是水深也}
