  - {type: variant, offset: 1306, length: 0, content: '', WYG: 淳風等按此術置句高乗下股得二百七十七尺二寸以上股除之得一丈二尺六寸以句高一丈二尺案此下原本衍六寸以句高一丈二尺九字減之餘有六寸以為法又置北行步展為一百三十二尺以句高乗之得一千五百八十四尺以上股除之得七十二尺又置上登五十一步以每步六尺通之得三百六尺以前數減之餘二百三十四尺以乗入股裏尺數得二千五百二十七尺二寸為實實如法而一得四千二百一十二尺以步里法除之得二里餘一百二步即是津廣也}
